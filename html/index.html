<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYONDO Hardware – Portal</title>
  <!-- Bootstrap + Font Awesome + Google Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&family=Syne:wght@400..800&family=DM+Sans:wght@300..600&display=swap" rel="stylesheet">
  <!-- Global main.css (provides colour variables, but we override specific portal styles in index.css) -->
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/index.css">
</head>
<body>
  <div class="container">
    <!-- Logo & Title -->
    <div class="text-center py-5">
      <div class="brand-logo mx-auto mb-3">
        <i class="fa-solid fa-tools"></i>
      </div>
      <h1 class="display-4 fw-bold">NYONDO Hardware</h1>
      <p class="lead text-muted">Enterprise Resource Management System</p>
    </div>

    <!-- Role Cards Row -->
    <div class="row g-4 justify-content-center">
      <div class="col-md-4">
        <div class="role-card" onclick="location.href = 'admin-dashboard.html'">
          <div class="role-icon"><i class="fa-solid fa-shield-haltered"></i></div>
          <h4>Administrator</h4>
          <p class="text-white-50">Full system control & reports</p>
          <button class="role-btn">Login →</button>
        </div>
      </div>
      <div class="col-md-4">
        <div class="role-card" onclick="location.href = 'manager-dashboard.html'">
          <div class="role-icon"><i class="fa-solid fa-chart-line"></i></div>
          <h4>Manager</h4>
          <p class="text-white-50">Analytics & stock management</p>
          <button class="role-btn">Login →</button>
        </div>
      </div>
      <div class="col-md-4">
        <div class="role-card" onclick="location.href = 'sales-dashboard.html'">
          <div class="role-icon"><i class="fa-solid fa-cart-shopping"></i></div>
          <h4>Sales Attendant</h4>
          <p class="text-white-50">Point of sale & customers</p>
          <button class="role-btn">Login →</button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <i class="fa-regular fa-copyright"></i> 2026 NYONDO General Hardware LTD. Secure portal.
    </div>
  </div>
</body>
</html>
